<main class="app-shell">
  <header class="app-header">
    <div class="header-top">
      <p class="eyebrow">Reserva de ajedrez</p>
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleColorScheme()"
        [attr.aria-pressed]="isLightMode()"
      >
        Cambiar a modo {{ themeButtonLabel() }}
      </button>
    </div>

    <h1>{{ title() }}</h1>
    <p>Gestiona tus partidas y reserva un tablero con facilidad.</p>
  </header>
  <app-chess-reservation></app-chess-reservation>
</main>
